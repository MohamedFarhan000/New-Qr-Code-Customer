<!DOCTYPE html>
<html>
<head>
    <title>Follow Me</title>

    <!-- Icons load panna (Font Awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body{
            text-align:center;
            font-family:Arial;
            margin-top:500px;
            background:#f5f5f5;
        }

        h2{
            margin-bottom:100px;
            font-size:50px;
        }

        .btn{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:12px;
            margin:50px auto;
            padding:28px;
            width:300px;
            text-decoration:none;
            color:black;
            border-radius:24px;
            font-size:28px;
            font-weight:bold;
        }

        /* Instagram style */
        .instagram{
            background: linear-gradient(45deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5);
        }

        /* TikTok style */
        .tiktok{
            background: linear-gradient(45deg, #000000, #25f4ee, #fe2c55);
        }
        /* Facebook style */
        .Facebook{
            background: linear-gradient(45deg, #1877f2, #3b5998);
        }



        /* Icon size */
        .btn i{
            font-size:30px;

        }

        .btn:hover{
            transform:scale(1.05);
            transition:0.5s;
        }
    </style>
</head>

<body>

<h2>Follow Me</h2>

<a class="btn instagram" href="https://www.instagram.com/kaushalyawenuri/"  target="_blank">
    <i class="fab fa-instagram"></i> Instagram
</a>

<a class="btn tiktok" href="https://www.tiktok.com/@wenurikaushalya66" target="_blank">
    <i class="fab fa-tiktok"></i> TikTok
</a>

<a class="btn Facebook" href="https://www.facebook.com/share/1HJY7DLCzJ/"  target="_blank">
    <i class="fab fa-Facebook"></i> Facebook
</a>

</body>
</html>
